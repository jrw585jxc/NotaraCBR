<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="NotaraCBR app icon">
  <title>NotaraCBR app icon</title>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="#0e0e0e"/>

  <!-- Pentagon outline — centered, scaled closer to edges -->
  <polygon points="248,204 776,204 866,468 512,820 158,468"
           fill="none" stroke="#b2b2b2" stroke-width="17"
           stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Vertex dots -->
  <g fill="#ffffff">
    <circle cx="248" cy="204" r="30"/>
    <circle cx="776" cy="204" r="30"/>
    <circle cx="866" cy="468" r="30"/>
    <circle cx="512" cy="820" r="30"/>
    <circle cx="158" cy="468" r="30"/>
  </g>

  <!-- N letterform -->
  <text x="512" y="418" text-anchor="middle" dominant-baseline="central"
        font-family="'Cormorant Garamond', 'Playfair Display', 'EB Garamond', Georgia, serif"
        font-style="italic" font-weight="500" font-size="360" fill="#ffffff">N</text>
</svg>
